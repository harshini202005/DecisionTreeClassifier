<!DOCTYPE html>
<html>
<head>
    <title>Grade Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Student Result Predictor</h2>
        <form action="/predict" method="post">
            <label>High School GPA:</label>
            <input type="text" name="gpa" required><br>

            <label>Extra Curricular Score:</label>
            <input type="text" name="extra" required><br>

            <label>Hours Studied:</label>
            <input type="text" name="hours" required><br>

            <label>Entrance Exam Score (encoded):</label>
            <input type="text" name="exam" required><br>

            <label>Internet Availability (0 = No, 1 = Yes):</label>
            <input type="text" name="internet" required><br>

            <button type="submit">Predict</button>
        </form>
    </div>
</body>
</html>
